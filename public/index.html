<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CareSync Pro</title>
    <!-- Tailwind CDN dipasang di sini agar CSS langsung aktif sebelum React Render -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            borderRadius: {
              "2xl": "1rem",
              "3xl": "1.5rem",
            },
          },
        },
      };
    </script>
    <style>
      /* Mencegah kedipan putih saat loading */
      body {
        background-color: #f8fafc;
      }
      .loading-screen {
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        font-family: sans-serif;
      }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="loading-screen">
        <p style="color: #6366f1; font-weight: bold">Memuat CareSync Pro...</p>
      </div>
    </div>
  </body>
</html>
